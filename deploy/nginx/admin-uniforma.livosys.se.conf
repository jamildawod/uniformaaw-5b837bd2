server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name admin-uniforma.livosys.se;

    ssl_certificate /etc/letsencrypt/live/admin-uniforma.livosys.se/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin-uniforma.livosys.se/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Next.js static assets (long-lived cache)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001/_next/static/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_buffering on;
    }

    # Proxy backend API calls directly to FastAPI (avoids double-hop)
    location /api/v1/ {
        proxy_pass http://127.0.0.1:9100/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 50M;
    }

    # All other requests → Next.js admin app on port 3001
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 50M;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name admin-uniforma.livosys.se;

    return 301 https://$host$request_uri;
}
